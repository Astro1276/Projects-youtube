<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Glow-Neon</title>
    <style>
        body{
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height:100vh;
            background: #050505;
            font-family: sans-serif;
            gap: 20px;
        }
        .input-box{
            position: relative;
            width: 300px;
        }
        .input-box input{
            width: 100%;
            padding: 15px;
            background: #111;
            border: none;
            outline: none;
            border-radius: 10px;
            color: #fff;
            font-size: 1em;
            transition: 0.5s;
        }
        
        .input-box span{
            position: absolute;
            left: 0;
            bottom: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, #ff00d2, #00d2ff);
            transform: scaleX(0);
            transition: 0.5s;
            transform-origin: left;
            filter: blur(5px);
        }
        
        .input-box input:focus ~ span{
            transform: scaleX(1);
            height: 100%;
            bottom: -2px;
            z-index: -1px;
            filter: blur(15px);
            opacity: 0.7;
        }
        
        .btn-enviar{
            padding: 12px 30px;
            background: transparent;
            color: #00d2ff;
            border: 2px solid #00d2ff;
            border-radius: 10px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: 0.4s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .btn-enviar:hover{
            background: #00d2ff;
            color: #050505;
            box-shadow: 0 0 25px #00d2f;
        }
        .btn-enviar:active{
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="input-box">
        <input type="text" placeholder="Escribe tu mensaje...">
        <span></span>
    </div>
    
    <button class="btn-enviar">Enviar</button>
</body>
</html>
